[time]
disabled = false
style = 'bold yellow'
time_format = '%H:%M:%S'
format = '[$time]($style) '

[cmd_duration]
disabled = false
min_time = 100
show_milliseconds = true
style = 'bold yellow'
format = '[´öá $duration]($style) ' # ÔÅ▒

[status]
style = 'bold red'
success_style = 'bold green'
symbol = '¯ê║ ' # ÔØî/´ö░
success_symbol = '¯ê║ ' # Ô£à/´üİ
format = '[$symbol$status$signal_name]($style) '
pipestatus = true
disabled = false

[character]
success_symbol = '[ÔØ»](bold green)'
error_symbol = '[ÔØ»](bold red)'

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true
