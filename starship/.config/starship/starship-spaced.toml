# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true

# WSL2 filesystem scans are slow ÔÇö give them more time before warning
scan_timeout = 100
command_timeout = 500

# Single info line, then prompt on its own line
format = """
$username$sudo$hostname$directory$git_branch$git_state$git_status$nodejs$golang$rust$python$dotnet$os$time$cmd_duration$status$line_break$character"""
# $shell

# Segment separator: [ ¯¬Â ] / [ ¯é▒ ]

[username]
style_user = 'bold yellow'
style_root = 'red bold'
format = '[$user]($style)'
disabled = false
show_always = true

[sudo]
style = 'bold red'
symbol = '!'
format = '[$symbol]($style)'
disabled = false
allow_windows = true

[hostname]
ssh_only = false
format = '[@](bold blue)[$hostname](bold yellow) [¯¬Â](bold white) '
disabled = false

[directory]
truncation_length = 8
truncation_symbol = 'ÔÇĞ/'
style = 'bold cyan'
format = '[$path]($style)[$read_only]($read_only_style) [¯¬Â](bold white) '
truncate_to_repo = false
before_repo_root_style = 'bold blue'
repo_root_style = 'bold green'
repo_root_format = '[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) [¯¬Â](bold white) '

[git_branch]
symbol = '¯éá'
style = 'bold purple'
truncation_length = 50
truncation_symbol = 'ÔÇĞ'
format = '[$symbol$branch(:$remote_branch)]($style) '

[git_state]
style = 'yellow'
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = '[¯èø ](bold red)'
merge = '[¯«½ ](bold red)'
revert = '[¾░òî ](bold red)'
rebase = '[¾░æÅ ](bold red)'

[git_status]
conflicted = '­şÅ│'
ahead = 'Ôçí${count} '
behind = 'Ôçú${count} '
diverged = 'Ôçò${ahead_count}Ôçú${behind_count} '
up_to_date = '[¾░ıò](bold green) '
untracked = '[?](bold blue) '
stashed = '[\$](bold yellow) '
modified = '[¾▒çğ](bold red) '
staged = '[++\($count\)](bold cyan) '
renamed = '[┬╗](bold yellow) '
deleted = '[¾░ù¿](bold purple) '
style = 'bold red'
format = '[|](white) [$all_status$ahead_behind]($style)[¯¬Â](bold white) '

[dotnet]
symbol = '.NET '
detect_extensions = ['cs', 'csproj', 'sln', 'xsln', 'fsproj', 'xproj']
style = 'bold cyan'
format = '[$symbol($version)]($style) [¯¬Â](bold white) '

[nodejs]
symbol = '¯£İ '
style = 'bold green'
format = '[$symbol($version)]($style) [¯¬Â](bold white) '

[golang]
symbol = 'Go ' # ­şÉ╣
style = 'bold cyan'
format = '[$symbol($version)]($style) [¯¬Â](bold white) '

[rust]
symbol = 'Rs ' # ­şĞÇ
style = 'bold #99908A'
format = '[$symbol($version)]($style) [¯¬Â](bold white) '

[python]
symbol = 'Py ' # ­şÉı
style = 'bold yellow'
pyenv_version_name = true
format = '[${symbol}(${version})( \($virtualenv\))]($style) [¯¬Â](bold white) '

[terraform]
symbol = 'tf ' # ­şÆá
style = 'bold 105'
format = '[$symbol$workspace]($style) [¯¬Â](bold white) '

[os]
style = 'bold cyan'
format = '[$symbol]($style) '
