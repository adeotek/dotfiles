format = '[$symbol$status$signal_name]($style)'
pipestatus = true
disabled = false

[character]
success_symbol = '[ÔØ»](bold green)'
error_symbol = '[ÔØ»](bold red)'

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

[custom.nx]
description = "NX version (walks up from cwd looking for nx.json)"
symbol = "nx"
style = "bg:#1d2230 bold fg:cyan"
format = '[$symbol($output)]($style)[|](bg:#1d2230 fg:blue)'
shell = ["cmd", "/C", "node", "-e"]
when = "var p=process.cwd(),d=require('path').dirname;while(p!==d(p)){try{require('fs').accessSync(p+'/nx.json');process.exit(0)}catch(e){p=d(p)}}process.exit(1)"
command = "var p=process.cwd(),d=require('path').dirname;while(p!==d(p)){try{require('fs').accessSync(p+'/nx.json');break}catch(e){p=d(p)}}try{process.stdout.write(require(p+'/node_modules/nx/package.json').version)}catch(e){}"

[custom.angular]
description = "Angular version (walks up from cwd looking for @angular/core)"
symbol = "¯Øô"
style = "bg:#1d2230 bold fg:purple"
format = '[$symbol($output)]($style)[|](bg:#1d2230 fg:blue)'
shell = ["cmd", "/C", "node", "-e"]
when = "var p=process.cwd(),d=require('path').dirname;while(p!==d(p)){try{require('fs').accessSync(p+'/node_modules/@angular/core/package.json');process.exit(0)}catch(e){p=d(p)}}process.exit(1)"
command = "var p=process.cwd(),d=require('path').dirname;while(p!==d(p)){try{require('fs').accessSync(p+'/node_modules/@angular/core/package.json');break}catch(e){p=d(p)}}try{process.stdout.write(require(p+'/node_modules/@angular/core/package.json').version)}catch(e){}"
