# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true

# WSL2 filesystem scans are slow ÔÇö give them more time before warning
scan_timeout = 500
command_timeout = 1000

# Single info line, then prompt on its own line
format = """
[¯éÂ](fg:#1d2230)\
$sudo\
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$nodejs\
${custom.nx}\
${custom.angular}\
$dotnet\
$golang\
$rust\
$python\
$terraform\
$os\
$time\
$cmd_duration\
$status\
[¯é┤](fg:#1d2230)\
$line_break\
$character"""

# $shell\
# Segment separator: [ ¯¬Â ]/[ ¯é▒ ]

[sudo]
style = 'bg:#1d2230 bold fg:red'
symbol = '!'
format = '[$symbol]($style)'
disabled = false
allow_windows = true

[username]
style_user = 'bg:#1d2230 bold fg:yellow'
style_root = 'bg:#1d2230 bold fg:red'
format = '[$user]($style)'
disabled = false
show_always = true

[hostname]
ssh_only = false
format = '[@](bg:#1d2230 bold fg:blue)[$hostname](bg:#1d2230 bold fg:white)[|](bg:#1d2230 fg:blue)'
disabled = false

[directory]
truncation_length = 8
truncation_symbol = 'ÔÇĞ/'
style = 'bg:#1d2230 bold fg:cyan'
format = '[$path]($style)[$read_only]($read_only_style)[|](bg:#1d2230 fg:blue)'
truncate_to_repo = false
before_repo_root_style = 'bg:#1d2230 bold fg:white'
repo_root_style = 'bg:#1d2230 bold fg:green'
repo_root_format = '[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style)[|](bg:#1d2230 fg:blue)'

[git_branch]
symbol = '¯éá'
style = 'bg:#1d2230 bold fg:purple'
truncation_length = 50
truncation_symbol = 'ÔÇĞ'
format = '[$symbol$branch(:$remote_branch)]($style)'

[git_state]
style = 'bg:#1d2230 bold fg:yellow'
format = '[\($state( $progress_current of $progress_total)\)]($style)'
cherry_pick = '[¯èø](bg:#1d2230 bold fg:red)'
merge = '[¯«½](bg:#1d2230 bold fg:red)'
revert = '[¾░òî](bg:#1d2230 bold fg:red)'
rebase = '[¾░æÅ](bg:#1d2230 bold fg:red)'

[git_status]
conflicted = '­şÅ│'
ahead = 'Ôçí${count}'
behind = 'Ôçú${count}'
diverged = 'Ôçò${ahead_count}Ôçú${behind_count}'
up_to_date = '[¾░ıò](bg:#1d2230 bold fg:green)'
untracked = '[?](bg:#1d2230 bold fg:white)'
stashed = '[\$](bg:#1d2230 bold fg:yellow)'
modified = '[¾▒çğ](bg:#1d2230 bold fg:red)'
staged = '[++\($count\)](bg:#1d2230 bold fg:cyan)'
renamed = '[┬╗](bg:#1d2230 bold fg:yellow)'
deleted = '[¾░ù¿](bg:#1d2230 bold fg:purple)'
style = 'bg:#1d2230 bold fg:red'
format = '[¯¬Â](bg:#1d2230 bold fg:white)[$all_status$ahead_behind]($style)[|](bg:#1d2230 fg:blue)'

[dotnet]
symbol = '¯Ø┐'
detect_extensions = ['cs', 'csproj', 'sln', 'xsln', 'fsproj', 'xproj']
style = 'bg:#1d2230 bold fg:cyan'
version_format = '${raw}'
format = '[$symbol($version)]($style)[|](bg:#1d2230 fg:blue)'

[nodejs]
symbol = '¾░ÄÖ'
style = 'bg:#1d2230 bold fg:green'
version_format = '${raw}'
format = '[$symbol($version)]($style)[|](bg:#1d2230 fg:blue)'

[golang]
symbol = '¯İğ' # ­şÉ╣
style = 'bg:#1d2230 bold fg:yellow'
