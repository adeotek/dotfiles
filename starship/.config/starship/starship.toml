[time]
disabled = false
style = 'bold yellow'
time_format = '%H:%M:%S'
format = '[$time]($style)[|](blue)'

[cmd_duration]
disabled = false
min_time = 100
show_milliseconds = true
style = 'bold cyan'
format = '[ï” $duration]($style)[|](blue)' # âڈ±

[status]
style = 'bold red'
success_style = 'bold white'
symbol = '[îˆ؛](bold red)[|](blue)' # â‌Œ/ï”°
success_symbol = '[îˆ؛](bold green)[|](blue)' # âœ…/ïپک
format = '[$symbol$status$signal_name]($style)'
pipestatus = true
disabled = false

[character]
