# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true

# WSL2 filesystem scans are slow ÔÇö give them more time before warning
scan_timeout = 200
command_timeout = 800

# Single info line, then prompt on its own line
format = """
${env_var.WSL_DISTRO_NAME}\
$sudo\
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$nodejs\
${custom.nx}\
${custom.angular}\
$dotnet\
$golang\
$rust\
$python\
$terraform\
$os\
$time\
$cmd_duration\
$status\
$line_break\
$character"""

# $shell\
# Segment separator: [ ¯¬Â ]/[ ¯é▒ ]

[env_var.WSL_DISTRO_NAME]
default = ''
style = 'bold cyan'
format = '[($symbol$env_value[|](blue))]($style)'

[sudo]
style = 'bold red'
symbol = '!'
format = '[$symbol]($style)'
disabled = false
allow_windows = true

[username]
style_user = 'bold yellow'
style_root = 'red bold'
format = '[$user]($style)'
disabled = false
show_always = true

[hostname]
ssh_only = false
format = '[@](bold blue)[$hostname](bold white)[|](blue)'
disabled = false

[directory]
truncation_length = 8
truncation_symbol = 'ÔÇª/'
style = 'bold cyan'
format = '[$path]($style)[$read_only]($read_only_style)[|](blue)'
truncate_to_repo = false
before_repo_root_style = 'bold white'
repo_root_style = 'bold green'
repo_root_format = '[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style)[|](blue)'

[git_branch]
symbol = '¯éá'
style = 'bold purple'
truncation_length = 50
truncation_symbol = 'ÔÇª'
format = '[$symbol$branch(:$remote_branch)]($style)'

[git_state]
style = 'yellow'
format = '[\($state( $progress_current of $progress_total)\)]($style)'
cherry_pick = '[¯èø](bold red)'
merge = '[¯«½](bold red)'
revert = '[¾░òî](bold red)'
rebase = '[¾░æÅ](bold red)'

[git_status]
conflicted = '­ƒÅ│'
ahead = 'Ôçí${count}'
behind = 'Ôçú${count}'
diverged = 'Ôçò${ahead_count}Ôçú${behind_count}'
up_to_date = '[¾░ìò](bold green)'
untracked = '[?](bold white)'
stashed = '[\$](bold yellow)'
modified = '[¾▒çº](bold red)'
staged = '[++\($count\)](bold cyan)'
renamed = '[┬╗](bold yellow)'
deleted = '[¾░ù¿](bold purple)'
style = 'bold red'
format = '[¯¬Â](bold white)[$all_status$ahead_behind]($style)[|](blue)'

[dotnet]
symbol = '¯Ø┐'
detect_extensions = ['cs', 'csproj', 'sln', 'xsln', 'fsproj', 'xproj']
style = 'bold cyan'
version_format = '${raw}'
format = '[$symbol($version)]($style)[|](blue)'

[nodejs]
symbol = '¾░ÄÖ'
style = 'bold green'
version_format = '${raw}'
format = '[$symbol($version)]($style)[|](blue)'

[golang]
symbol = '¯ÿº' # ­ƒÉ╣
style = 'bold yellow'
version_format = '${raw}'
format = '[$symbol($version)]($style)[|](blue)'

[rust]
symbol = '¯×¿' # ­ƒªÇ
style = 'bold #99908A'
version_format = '${raw}'
format = '[$symbol($version)]($style)[|](blue)'

[python]
symbol = '¯êÁ' # ­ƒÉì
style = 'bold yellow'
pyenv_version_name = true
version_format = '${raw}'
format = '[${symbol}(${version})(\($virtualenv\))]($style)[|](blue)'

[terraform]
symbol = '¯ÜÜ' # ­ƒÆá
style = 'bold 105'
version_format = '${raw}'
format = '[$symbol($version)]($style)[¯¬Â](bold white)[$workspace](bold cyan)[|](blue)'
detect_extensions =	['tf', 'tfplan', 'tfstate', 'hcl']
disabled = false

[os]
style = 'white'
format = '[$symbol]($style)[|](blue)'
disabled = false
