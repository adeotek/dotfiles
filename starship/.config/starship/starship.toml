# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true

# WSL2 filesystem scans are slow — give them more time before warning
scan_timeout = 100
command_timeout = 500

# Single info line, then prompt on its own line
format = """
$username$sudo$hostname$directory$git_branch$git_state$git_status$nodejs$golang$rust$python$dotnet$os$time$cmd_duration$status$line_break$character"""
# $shell

# Segment separator: [  ]/[  ]

[username]
style_user = 'bold yellow'
style_root = 'red bold'
format = '[$user]($style)'
disabled = false
show_always = true

[sudo]
style = 'bold red'
symbol = '!'
format = '[$symbol]($style)'
disabled = false
allow_windows = true

[hostname]
ssh_only = false
format = '[@](bold white)[$hostname](bold yellow)[|](blue)'
disabled = false

[directory]
truncation_length = 8
truncation_symbol = '…/'
style = 'bold cyan'
format = '[$path]($style)[$read_only]($read_only_style)[|](blue)'
truncate_to_repo = false
before_repo_root_style = 'bold white'
repo_root_style = 'bold green'
repo_root_format = '[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style)[|](blue)'

[git_branch]
symbol = ''
style = 'bold purple'
truncation_length = 50
truncation_symbol = '…'
format = '[$symbol$branch(:$remote_branch)]($style)'

[git_state]
style = 'yellow'
format = '[\($state( $progress_current of $progress_total)\)]($style)'
cherry_pick = '[](bold red)'
merge = '[](bold red)'
revert = '[󰕌](bold red)'
rebase = '[󰑏](bold red)'

[git_status]
conflicted = '🏳'
ahead = '⇡${count}'
behind = '⇣${count}'
diverged = '⇕${ahead_count}⇣${behind_count}'
up_to_date = '[󰍕](bold green)'
untracked = '[?](bold white)'
stashed = '[\$](bold yellow)'
modified = '[󱇧](bold red)'
staged = '[++\($count\)](bold cyan)'
renamed = '[»](bold yellow)'
deleted = '[󰗨](bold purple)'
style = 'bold red'
format = '[](bold white)[$all_status$ahead_behind]($style)[|](blue)'

[dotnet]
symbol = '.NET:'
detect_extensions = ['cs', 'csproj', 'sln', 'xsln', 'fsproj', 'xproj']
style = 'bold cyan'
format = '[$symbol($version)]($style)[|](blue)'

[nodejs]
symbol = ''
style = 'bold green'
format = '[$symbol($version)]($style)[|](blue)'

[golang]
symbol = 'Go:' # 🐹
style = 'bold cyan'
format = '[$symbol($version)]($style)[|](blue)'

[rust]
symbol = 'Rs:' # 🦀
style = 'bold #99908A'
format = '[$symbol($version)]($style)[|](blue)'

[python]
symbol = 'Py:' # 🐍
style = 'bold yellow'
pyenv_version_name = true
format = '[${symbol}(${version})(\($virtualenv\))]($style)[|](blue)'

[terraform]
symbol = 'tf:' # 💠
style = 'bold 105'
format = '[$symbol$workspace]($style)[|](blue)'

[os]
style = 'bold cyan'
format = '[$symbol]($style)[|](blue)'
disabled = false
[os.symbols]
Alpaquita = ""
Alpine = ""
Amazon = ""
