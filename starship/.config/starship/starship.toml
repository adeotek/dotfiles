# [shell]
# bash_indicator = 'bash'
# pwsh_indicator = 'pwsh'
# format = '[$indicator]($style)'
# disabled = false

[time]
disabled = false
style = 'bold yellow'
time_format = '%H:%M:%S'
format = '[$time]($style)[|](blue)'

[cmd_duration]
disabled = false
min_time = 100
show_milliseconds = true
style = 'bold cyan'
format = '[$duration]($style)[|](blue)' # ⏱

[status]
style = 'bold red'
success_style = 'bold white'
symbol = '[](bold red)' # ❌/
success_symbol = '[](bold green)' # ✅/
format = '[$symbol$status$signal_name]($style)'
pipestatus = true
disabled = false

[character]
success_symbol = '[❯](bold green)'
error_symbol = '[❯](bold red)'

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true
