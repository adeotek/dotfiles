# [shell]
# bash_indicator = 'bash'
# pwsh_indicator = 'pwsh'
# format = '[$indicator]($style)'
# disabled = false

[time]
disabled = false
style = 'bold white'
time_format = '%H:%M:%S'
format = '[$time]($style)[|](blue)'

[cmd_duration]
disabled = false
min_time = 100
show_milliseconds = true
style = 'bold cyan'
format = '[ΎΦι$duration]($style)[|](blue)' # έΠ▒

[status]
style = 'bold red'
success_style = 'bold black'
symbol = '[ΌΙ║](bold red)[|](blue)' # έζΝ/ΎΦ░
success_symbol = '[ΌΙ║](bold green)[|](blue)' # έεΖ/ΎΒα
format = '[$symbol$status$signal_name]($style)'
pipestatus = true
disabled = false

[character]
success_symbol = '[έζψ](bold green)'
error_symbol = '[έζψ](bold red)'

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true
