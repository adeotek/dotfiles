# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true

# WSL2 filesystem scans are slow â€” give them more time before warning
scan_timeout = 30

# Single info line, then prompt on its own line
format = """
$username$sudo$hostname$directory$git_branch$git_state$git_status$nodejs$golang$rust$python$dotnet$time$os$shell$cmd_duration$status$line_break$character"""

# Segment separator: [îھ¶](yellow) / [î‚±](yellow)

[username]
style_user = 'white bold'
style_root = 'red bold'
format = '[$user]($style)'
disabled = false
show_always = true

[sudo]
style = 'bold red'
symbol = '!'
format = '[$symbol]($style)'
disabled = false
allow_windows = true

[hostname]
ssh_only = false
format = '[@](bold yellow)[$hostname](bold white) [îھ¶](yellow) '
disabled = false

[directory]
truncation_length = 8
truncation_symbol = 'â€¦/'
style = 'bold cyan'
format = '[$path]($style)[$read_only]($read_only_style) [îھ¶](yellow) '
truncate_to_repo = false
before_repo_root_style = 'bold white'
repo_root_style = 'bold green'
repo_root_format = '[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) [îھ¶](yellow) '

[git_branch]
symbol = 'î‚ '
style = 'bold purple'
truncation_length = 50
truncation_symbol = 'â€¦'
format = '[$symbol$branch(:$remote_branch)]($style) '

[git_state]
style = 'yellow'
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = '[îٹ› ](bold red)'
merge = '[î®« ](bold red)'
revert = '[َ°•Œ ](bold red)'
rebase = '[َ°‘ڈ ](bold red)'

[git_status]
conflicted = 'ًںڈ³'
ahead = 'â‡،${count} '
behind = 'â‡£${count} '
diverged = 'â‡•${ahead_count}â‡£${behind_count} '
up_to_date = '[َ°چ•](bold green) '
untracked = '[?](bold white) '
stashed = '[\$](bold yellow) '
modified = '[َ±‡§](bold red) '
staged = '[++\($count\)](bold cyan) '
renamed = '[آ»](bold yellow) '
deleted = '[َ°—¨](bold purple) '
style = 'bold red'
format = '[|](yellow) [$all_status$ahead_behind]($style)[îھ¶](yellow) '

[dotnet]
symbol = '.NET '
detect_extensions = ['cs', 'csproj', 'sln', 'xsln', 'fsproj', 'xproj']
style = 'bold cyan'
format = '[$symbol($version )(ًںژ¯ $tfm )]($style) [îھ¶](yellow) '

[nodejs]
symbol = 'îœک '
style = 'bold green'
format = '[$symbol($version )]($style) [îھ¶](yellow) '

[golang]
symbol = 'GO ' # ًںگ¹
style = 'bold cyan'
format = '[$symbol($version )]($style) [îھ¶](yellow) '

[rust]
symbol = 'RS ' # ًں¦€
style = 'bold #99908A'
format = '[$symbol($version )]($style) [îھ¶](yellow) '

[python]
symbol = 'PY ' # ًںگچ
style = 'yellow bold'
pyenv_version_name = true
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style) [îھ¶](yellow) '

[terraform]
symbol = 'tf:' # ًں’ 
style = 'bold 105'
format = '[$symbol$workspace]($style) [îھ¶](yellow) '

[time]
disabled = false
style = 'bold white'
time_format = '%H:%M:%S'
format = '[$time]($style) '

[os]
style = 'bold cyan'
format = '[$symbol]($style) '
