# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true

# WSL2 filesystem scans are slow έΑΦ give them more time before warning
scan_timeout = 100
command_timeout = 500

# Single info line, then prompt on its own line
format = """
$sudo\
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$nodejs\
$dotnet\
$golang\
$rust\
$python\
$terraform\
$os\
$time\
$cmd_duration\
$status\
$line_break\
$character"""

# $shell\
# Segment separator: [ Ός╢ ]/[ ΌΓ▒ ]

[sudo]
style = 'bold red'
symbol = '!'
format = '[$symbol]($style)'
disabled = false
allow_windows = true

[username]
style_user = 'bold yellow'
style_root = 'red bold'
format = '[$user]($style)'
disabled = false
show_always = true

[hostname]
ssh_only = false
format = '[@](bold blue)[$hostname](bold white)[|](blue)'
disabled = false

[directory]
truncation_length = 8
truncation_symbol = 'έΑο/'
style = 'bold cyan'
format = '[$path]($style)[$read_only]($read_only_style)[|](blue)'
truncate_to_repo = false
before_repo_root_style = 'bold white'
repo_root_style = 'bold green'
repo_root_format = '[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style)[|](blue)'

[git_branch]
symbol = 'ΌΓι'
style = 'bold purple'
truncation_length = 50
truncation_symbol = 'έΑο'
format = '[$symbol$branch(:$remote_branch)]($style)'

[git_state]
style = 'yellow'
format = '[\($state( $progress_current of $progress_total)\)]($style)'
cherry_pick = '[ΌΛδ](bold red)'
merge = '[Όχτ](bold red)'
revert = '[≤░ΧΝ](bold red)'
rebase = '[≤░ΣΠ](bold red)'

[git_status]
conflicted = 'ΏθΠ│'
ahead = 'έΘκ${count}'
behind = 'έΘμ${count}'
diverged = 'έΘΧ${ahead_count}έΘμ${behind_count}'
up_to_date = '[≤░ΞΧ](bold green)'
untracked = '[?](bold white)'
stashed = '[\$](bold yellow)'
modified = '[≤▒Θπ](bold red)'
staged = '[++\($count\)](bold cyan)'
renamed = '[┬╗](bold yellow)'
deleted = '[≤░Ωρ](bold purple)'
style = 'bold red'
format = '[Ός╢](bold white)[$all_status$ahead_behind]($style)[|](blue)'

[dotnet]
symbol = '.NET:'
detect_extensions = ['cs', 'csproj', 'sln', 'xsln', 'fsproj', 'xproj']
style = 'bold cyan'
format = '[$symbol($version)]($style)[|](blue)'

[nodejs]
symbol = 'Όεα'
style = 'bold green'
format = '[$symbol($version)]($style)[|](blue)'

[golang]
symbol = 'Go:' # ΏθΡ╣
style = 'bold cyan'
format = '[$symbol($version)]($style)[|](blue)'

[rust]
symbol = 'Rs:' # ΏθοΑ
style = 'bold #99908A'
format = '[$symbol($version)]($style)[|](blue)'

[python]
symbol = 'Py:' # ΏθΡΞ
style = 'bold yellow'
pyenv_version_name = true
format = '[${symbol}(${version})(\($virtualenv\))]($style)[|](blue)'

[terraform]
symbol = 'tf:' # ΏθΤι
style = 'bold 105'
format = '[$symbol$version]($style)[Ός╢](bold white)[$workspace](bold cyan)[|](blue)'
detect_extensions =	['tf', 'tfplan', 'tfstate', 'hcl']
disabled = false

[os]
style = 'white'
format = '[$symbol]($style)[|](blue)'
disabled = false
[os.symbols]
