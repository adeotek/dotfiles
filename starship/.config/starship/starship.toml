# [shell]
# bash_indicator = 'bash'
# pwsh_indicator = 'pwsh'
# format = '[$indicator]($style)'
# disabled = false

[time]
disabled = false
style = 'bold white'
time_format = '%H:%M:%S'
format = '[$time]($style)[|](blue)'

[cmd_duration]
disabled = false
min_time = 100
show_milliseconds = true
style = 'bold cyan'
format = '[´öá$duration]($style)[|](blue)' # ÔÅ▒

[status]
style = 'bold red'
success_style = 'bold black'
symbol = '[¯ê║](bold red)[|](blue)' # ÔØî/´ö░
success_symbol = '[¯ê║](bold green)[|](blue)' # Ô£à/´üÿ
format = '[$symbol$status$signal_name]($style)'
pipestatus = true
disabled = false

[character]
success_symbol = '[ÔØ»](bold green)'
error_symbol = '[ÔØ»](bold red)'

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

[custom.nx]
description = "NX version (shown when nx.json found in git root)"
symbol = "nx"
style = "bold cyan"
format = '[$symbol($output)]($style)[|](blue)'
detect_files = []
detect_folders = []
detect_extensions = []
when = 'root=$(git rev-parse --show-toplevel 2>/dev/null) && test -n "$root" && test -f "$root/nx.json"'
command = 'node -p "require(\"$(git rev-parse --show-toplevel)/node_modules/nx/package.json\").version" 2>/dev/null'

[custom.angular]
description = "Angular version (shown when @angular/core is installed at git root)"
symbol = "¯Øô"
style = "bold purple"
format = '[$symbol($output)]($style)[|](blue)'
detect_files = []
detect_folders = []
detect_extensions = []
when = 'root=$(git rev-parse --show-toplevel 2>/dev/null) && test -n "$root" && test -f "$root/node_modules/@angular/core/package.json"'
command = 'node -p "require(\"$(git rev-parse --show-toplevel)/node_modules/@angular/core/package.json\").version" 2>/dev/null'
